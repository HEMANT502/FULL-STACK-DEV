<!DOCTYPE html>
<html>
<head>
  <title>Simple Calendar</title>
</head>
<body>
  <h2 style="text-align:center;">February 2026</h2>
  <table style="border:1px solid black; border-collapse:collapse; width:60%; margin:auto;">
    <tr>
      <th style="border:1px solid black; padding:5px;">Sun</th>
      <th style="border:1px solid black; padding:5px;">Mon</th>
      <th style="border:1px solid black; padding:5px;">Tue</th>
      <th style="border:1px solid black; padding:5px;">Wed</th>
      <th style="border:1px solid black; padding:5px;">Thu</th>
      <th style="border:1px solid black; padding:5px;">Fri</th>
      <th style="border:1px solid black; padding:5px;">Sat</th>
    </tr>
    <tr>
      <td style="border:1px solid black; padding:5px;"></td>
      <td style="border:1px solid black; padding:5px;">2</td>
      <td style="border:1px solid black; padding:5px;">3</td>
      <td style="border:1px solid black; padding:5px;">4</td>
      <td style="border:1px solid black; padding:5px;">5</td>
      <td style="border:1px solid black; padding:5px;">6</td>
      <td style="border:1px solid black; padding:5px;">7</td>
    </tr>
    <tr>
      <td style="border:1px solid black; padding:5px;">8</td>
      <td style="border:1px solid black; padding:5px;">9</td>
      <td style="border:1px solid black; padding:5px;">10</td>
      <td style="border:1px solid black; padding:5px;">11</td>
      <td style="border:1px solid black; padding:5px;">12</td>
      <td style="border:1px solid black; padding:5px;">13</td>
      <td style="border:1px solid black; padding:5px;">14</td>
    </tr>
    <!-- Add more rows for rest of the month -->
  </table>
</body>
</html>
