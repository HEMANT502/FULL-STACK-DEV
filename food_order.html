<!DOCTYPE html>
<html>
<head>
  <title>Food Order</title>
  <link rel="stylesheet" href="food_order.css">
</head>
<body>
  <h1>Welcome to My Food Order Website</h1>

  <h2>Menu</h2>
  <ul>
    <li>Pizza - $10 <button>Order</button></li>
    <li>Burger - $7 <button>Order</button></li>
    <li>Pasta - $8 <button>Order</button></li>
  </ul>

  <h2>Order Form</h2>
  <form>
    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Food Item:</label><br>
    <input type="text" name="food"><br><br>

    <label>Address:</label><br>
    <textarea name="address"></textarea><br><br>

    <button type="submit">Place Order</button>
  </form>

  <footer>
    <p>© 2026 My Food Website</p>
  </footer>
</body>
</html>
